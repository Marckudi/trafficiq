<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Predicciones · Copa del Mundo 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { font-size: 16px; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
    }
    #app { max-width: 448px; margin: 0 auto; padding: 52px 12px 48px; }

    /* Header */
    .page-eyebrow { font-size: 10px; color: #4b5563; text-transform: uppercase; letter-spacing: .12em; font-weight: 600; margin-bottom: 4px; }
    .page-title   { font-size: 26px; font-weight: 800; letter-spacing: -.5px; margin-bottom: 4px; }
    .page-sub     { font-size: 10px; color: #4b5563; margin-bottom: 28px; }

    /* Day group */
    .day-label { font-size: 11px; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; padding: 0 4px; margin-bottom: 8px; }
    .day-group { margin-bottom: 24px; }

    /* Card */
    .card { background: #111; border-radius: 16px; margin-bottom: 12px; overflow: hidden; }
    .card-meta { font-size: 10px; color: #4b5563; padding: 10px 16px 4px; line-height: 1.4; }

    /* Teams row */
    .teams-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 8px 16px 12px; }
    .team { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; min-width: 0; }
    .team-flag { font-size: 32px; line-height: 1; }
    .team-name { font-size: 11px; color: #e5e7eb; font-weight: 500; text-align: center; line-height: 1.3; }
    .score-box  { display: flex; align-items: center; gap: 6px; background: #1c1c1c; border-radius: 12px; padding: 10px 20px; flex-shrink: 0; }
    .score-num  { color: #fff; font-size: 22px; font-weight: 700; }
    .score-sep  { color: #4b5563; font-size: 14px; font-weight: 300; }

    /* Prob strip */
    .prob-wrap  { padding: 0 16px 12px; }
    .prob-bar   { display: flex; height: 6px; border-radius: 9999px; overflow: hidden; gap: 2px; margin-bottom: 6px; }
    .prob-seg-h { background: #22c55e; border-radius: 9999px 0 0 9999px; }
    .prob-seg-d { background: #facc15; }
    .prob-seg-a { background: #ef4444; border-radius: 0 9999px 9999px 0; }
    .prob-pcts  { display: flex; font-size: 11px; font-weight: 600; margin-bottom: 4px; }
    .prob-lbls  { display: flex; font-size: 10px; color: #4b5563; }
    .prob-pcts > span, .prob-lbls > span { flex: 1; text-align: center; }
    .ph { color: #4ade80; } .pd { color: #facc15; } .pa { color: #f87171; }

    /* Odds row */
    .odds-row { display: flex; border-top: 1px solid #1e1e1e; border-bottom: 1px solid #1e1e1e; }
    .odds-cell { flex: 1; padding: 8px 0; text-align: center; }
    .odds-cell + .odds-cell { border-left: 1px solid #1e1e1e; }
    .odds-lbl { font-size: 9px; color: #4b5563; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 2px; }
    .odds-val  { font-size: 14px; font-weight: 700; }

    /* Why toggle */
    .why-btn  { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: none; border: none; cursor: pointer; color: inherit; }
    .why-btn:active { background: rgba(255,255,255,.03); }
    .why-label { font-size: 11px; color: #9ca3af; font-weight: 600; }
    .chevron   { transition: transform .22s ease; flex-shrink: 0; }
    .chevron.open { transform: rotate(180deg); }

    /* SHAP section */
    .why-body  { overflow: hidden; max-height: 0; opacity: 0; transition: max-height .3s ease, opacity .25s ease; padding: 0 16px; }
    .why-body.open { max-height: 600px; opacity: 1; }
    .why-inner { border-top: 1px solid #1e1e1e; padding-top: 12px; }
    .shap-row  { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
    .shap-name { font-size: 10px; color: #6b7280; width: 140px; flex-shrink: 0; text-align: right; line-height: 1.3; }
    .shap-bars { display: flex; flex: 1; align-items: center; height: 16px; }
    .shap-left { flex: 1; display: flex; justify-content: flex-end; align-items: center; padding-right: 1px; }
    .shap-div  { width: 1px; height: 14px; background: #374151; flex-shrink: 0; }
    .shap-right{ flex: 1; display: flex; align-items: center; padding-left: 1px; }
    .shap-bar  { height: 7px; border-radius: 2px; }
    .shap-val  { font-size: 10px; font-family: 'SF Mono', 'Fira Mono', monospace; width: 52px; text-align: right; flex-shrink: 0; }
    .consensus { font-size: 10px; color: #4b5563; margin: 12px 0 20px; line-height: 1.65; }

    /* Footer */
    .footer { text-align: center; font-size: 10px; color: #374151; margin-top: 16px; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const DATA = [
  {
    dateLabel: 'Jueves, 11 De Junio',
    matches: [
      {
        id: 'mex-rsa',
        homeTeam: 'México', homeFlag: '🇲🇽',
        awayTeam: 'South Africa', awayFlag: '🇿🇦',
        score: [1, 0],
        probs: [0.44, 0.29, 0.27],
        odds: [2.27, 3.45, 3.70],
        group: 'Grupo B', venue: 'SoFi Stadium, Los Ángeles', time: '01:00',
        shap: [
          { name: 'Diferencia de Elo',               v:  8.368 },
          { name: 'Racha del local',                 v: -5.131 },
          { name: 'Cancha neutral',                  v:  1.204 },
          { name: 'En del local (Ult. 3)',           v:  8.900 },
          { name: 'Goles en contra local (Ult. 3)',  v: -0.900 },
        ],
        text: 'Las 10.000 simulaciones de Montecarlo proyectan a México como favorito con el marcador 1-0 como el más probable (aunque con margen estrecho). Con SHAP se identifica que la diferencia de Elo y el promedio de goles favorecen al local, mientras la racha reciente reduce ligeramente la ventaja. El modelo ajusta automáticamente sus pesos tras cada resultado real.'
      }
    ]
  },
  {
    dateLabel: 'Viernes, 12 De Junio',
    matches: [
      {
        id: 'kor-cze',
        homeTeam: 'South Korea', homeFlag: '🇰🇷',
        awayTeam: 'Czech Republic', awayFlag: '🇨🇿',
        score: [1, 3],
        probs: [0.27, 0.25, 0.48],
        odds: [3.70, 4.00, 2.08],
        group: 'Grupo E', venue: 'MetLife Stadium, Nueva York', time: '18:00',
        shap: [
          { name: 'Diferencia de Elo',               v: -4.120 },
          { name: 'Racha del local',                 v:  2.438 },
          { name: 'Cancha neutral',                  v:  3.201 },
          { name: 'En del local (Ult. 3)',           v:  3.560 },
          { name: 'Goles en contra local (Ult. 3)',  v: -6.340 },
        ],
        text: 'Las 10.000 simulaciones proyectan a República Checa como favorita con un marcador 3-1. La diferencia de Elo negativa (Corea) y la elevada media de goles encajados son los factores determinantes según el análisis SHAP.'
      },
      {
        id: 'can-bih',
        homeTeam: 'Canada', homeFlag: '🇨🇦',
        awayTeam: 'Bosnia & Herz.', awayFlag: '🇧🇦',
        score: [1, 0],
        probs: [0.48, 0.28, 0.24],
        odds: [2.08, 3.57, 4.17],
        group: 'Grupo F', venue: 'BMO Field, Toronto', time: '21:00',
        shap: [
          { name: 'Diferencia de Elo',               v:  5.672 },
          { name: 'Racha del local',                 v:  3.820 },
          { name: 'Cancha neutral',                  v: -2.104 },
          { name: 'En del local (Ult. 3)',           v:  4.310 },
          { name: 'Goles en contra local (Ult. 3)',  v: -1.230 },
        ],
        text: 'Las 10.000 simulaciones favorecen a Canadá jugando en casa con un marcador ajustado 1-0. La ventaja local y la diferencia de Elo son los factores clave según el análisis SHAP.'
      }
    ]
  }
];

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function barColor(v) {
  if (Math.abs(v) < 1.2) return '#fb923c';
  return v >= 0 ? '#22c55e' : '#ef4444';
}
function textColor(v) {
  if (Math.abs(v) < 1.2) return '#fb923c';
  return v >= 0 ? '#4ade80' : '#f87171';
}
function fmt(v) { return (v >= 0 ? '+' : '') + v.toFixed(3); }

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderShap(features) {
  const max = Math.max(...features.map(f => Math.abs(f.v)));
  return features.map(f => {
    const pos = f.v >= 0;
    const pct = Math.min((Math.abs(f.v) / max) * 100, 100);
    const bc  = barColor(f.v);
    const tc  = textColor(f.v);
    const barStyle = `background:${bc};width:${pct}%;opacity:.9;`;
    return `
      <div class="shap-row">
        <span class="shap-name">${f.name}</span>
        <div class="shap-bars">
          <div class="shap-left">${!pos ? `<div class="shap-bar" style="${barStyle}"></div>` : ''}</div>
          <div class="shap-div"></div>
          <div class="shap-right">${pos ? `<div class="shap-bar" style="${barStyle}"></div>` : ''}</div>
        </div>
        <span class="shap-val" style="color:${tc};">${fmt(f.v)}</span>
      </div>`;
  }).join('');
}

function renderMatch(m) {
  const h = Math.round(m.probs[0] * 100);
  const d = Math.round(m.probs[1] * 100);
  const a = 100 - h - d;
  return `
    <div class="card">
      <p class="card-meta">FG: ${m.group} · ${m.time}h · ${m.venue}</p>
      <div class="teams-row">
        <div class="team">
          <span class="team-flag">${m.homeFlag}</span>
          <span class="team-name">${m.homeTeam}</span>
        </div>
        <div class="score-box">
          <span class="score-num">${m.score[0]}</span>
          <span class="score-sep">–</span>
          <span class="score-num">${m.score[1]}</span>
        </div>
        <div class="team">
          <span class="team-flag">${m.awayFlag}</span>
          <span class="team-name">${m.awayTeam}</span>
        </div>
      </div>
      <div class="prob-wrap">
        <div class="prob-bar">
          <div class="prob-seg-h" style="width:${h}%"></div>
          <div class="prob-seg-d" style="width:${d}%"></div>
          <div class="prob-seg-a" style="width:${a}%"></div>
        </div>
        <div class="prob-pcts">
          <span class="ph">${h}%</span>
          <span class="pd">${d}%</span>
          <span class="pa">${a}%</span>
        </div>
        <div class="prob-lbls">
          <span>1</span><span>X</span><span>2</span>
        </div>
      </div>
      <div class="odds-row">
        <div class="odds-cell"><p class="odds-lbl">Local</p><p class="odds-val ph">${m.odds[0].toFixed(2)}</p></div>
        <div class="odds-cell"><p class="odds-lbl">Empate</p><p class="odds-val pd">${m.odds[1].toFixed(2)}</p></div>
        <div class="odds-cell"><p class="odds-lbl">Visitante</p><p class="odds-val pa">${m.odds[2].toFixed(2)}</p></div>
      </div>
      <button class="why-btn" data-id="${m.id}">
        <span class="why-label">¿Por qué?</span>
        <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 9l-7 7-7-7"/>
        </svg>
      </button>
      <div class="why-body" id="why-${m.id}">
        <div class="why-inner">
          ${renderShap(m.shap)}
        </div>
        <p class="consensus">${m.text}</p>
      </div>
    </div>`;
}

function renderDay(day) {
  return `
    <div class="day-group">
      <p class="day-label">${day.dateLabel}</p>
      ${day.matches.map(renderMatch).join('')}
    </div>`;
}

document.getElementById('app').innerHTML = `
  <p class="page-eyebrow">Copa del Mundo 2026</p>
  <h1 class="page-title">⚽ Predicciones</h1>
  <p class="page-sub">XGBoost + Montecarlo (10k sims) + SHAP</p>
  ${DATA.map(renderDay).join('')}
  <p class="footer">El modelo se reentrena automáticamente tras cada resultado real.</p>
`;

// ─── TOGGLE ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.why-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const id   = btn.dataset.id;
    const body = document.getElementById('why-' + id);
    const chev = btn.querySelector('.chevron');
    const open = body.classList.toggle('open');
    chev.classList.toggle('open', open);
  });
});
</script>
</body>
</html>
